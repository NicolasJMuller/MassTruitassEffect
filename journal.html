        <a href="aPropos.html">À propos</a>

<script>
    function toggleMenu() {
        document.getElementById('navLiens').classList.toggle('actif');
    }
</script>

<main id="journal"></main>

    <footer>
        <p>© 2079 Mass Truitass Effect — Cellule de communication du Centre de Contrôle Aurora. Tous droits réservés.</p>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('navLiens').classList.toggle('actif');
        }

        function genererJauge(avancement, max) {
            let barres = '';
            for (let i = 0; i < max; i++) {
                if (i < avancement) {
                    barres += `<div class="barre pleine"></div>`;
                } else {
                    barres += `<div class="barre vide"></div>`;
                }
            }
            return barres;
        }

        fetch('journal.json')
            .then(r => r.json())
            .then(entrees => {
                const journal = document.getElementById('journal');
                entrees.forEach((entree, index) => {
                    journal.innerHTML += `
                        <article>
                            <div class="article-header">
                                <h2>${entree.titre}</h2>
                                <span class="meta">${entree.date} | ${entree.heure}</span>
                            </div>
                            <div class="article-infos">
                                <span>Nature : ${entree.nature}</span>
                                <span>Gravité : ${entree.gravite}</span>
                                <span>Statut : ${entree.statut}</span>
                            </div>
                            <p class="description">${entree.description}</p>
                            <div class="jauge-label">Résolution : ${entree.avancement}/${entree.avancement_max}</div>
                            <div class="jauge">
                                ${genererJauge(entree.avancement, entree.avancement_max)}
                            </div>
                        </article>
                        ${index < entrees.length - 1 ? '<hr>' : ''}
                    `;
                });
            });
    </script>

</body>
</html>
